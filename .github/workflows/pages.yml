name: Deploy dashboard to GitHub Pages

# เสิร์ฟเวอร์ชัน standalone (รันในเบราว์เซอร์ล้วน) จากโฟลเดอร์ legacy/
# ให้ทุกคนเข้าผ่าน https://torsak6589-creator.github.io/KST-Delivery-Tracker/
on:
  push:
    branches: [main]
    paths:
      - 'legacy/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload site (legacy standalone)
        uses: actions/upload-pages-artifact@v3
        with:
          path: legacy
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
