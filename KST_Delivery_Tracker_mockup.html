  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

         <div>\n            <div style=\"display:flex;align-items:center;gap:10px\">\n              <span style=\"font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:{{ accent }};background:{{ accentSoft }};padding:3px 10px;border-radius:8px\">PO {{ modalPoNo }}<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:20px;font-size:11.5px;font-weight:600;background:{{ modalBBg }};color:{{ modalBColor }}\"><span style=\"width:6px;height:6px;border-radius:50%;background:{{ modalBDot }}\"><\u002Fspan>{{ modalBadge }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:17px;font-weight:700;margin-top:9px;letter-spacing:-.3px\">{{ modalItemName }}<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#8A90A2;margin-top:2px\">{{ modalVendor }}<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ closeModal }}\" style=\"width:32px;height:32px;min-width:32px;border:none;background:#F2F3F8;border-radius:9px;cursor:pointer;font-size:16px;color:#6B7186;display:flex;align-items:center;justify-content:center\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:22px 26px\">\n          <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px 20px\">\n            <div><div style=\"font-size:10.5px;font-weight:700;color:#A0A6B6;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px\">Line Item<\u002Fdiv><div style=\"font-family:'DM Mono',monospace;font-size:13.5px\">{{ modalLine }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:10.5px;font-weight:700;color:#A0A6B6;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px\">วันที่ออก PO<\u002Fdiv><div style=\"font-family:'DM Mono',monospace;font-size:13.5px\">{{ modalPoDate }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:10.5px;font-weight:700;color:#A0A6B6;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px\">สถานะ PO<\u002Fdiv><div style=\"font-size:13.5px;font-weight:600\">{{ modalPoStatus }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <hr style=\"border:none;border-top:1px solid #F0F1F6;margin:18px 0\">\n          <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px 20px\">\n            <div style=\"grid-column:1/3\"><div style=\"font-size:10.5px;font-weight:700;color:#A0A6B6;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px\">Supplier<\u002Fdiv><div style=\"font-size:14px;font-weight:600\">{{ modalVendor }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:10.5px;font-weight:700;color:#A0A6B6;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px\">รหัสผู้ขาย<\u002Fdiv><div style=\"font-family:'DM Mono',monospace;font-size:13.5px\">{{ modalVendorCode }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:10.5px;font-weight:700;color:#A0A6B6;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px\">รหัสสินค้า<\u002Fdiv><div style=\"font-family:'DM Mono',monospace;font-size:13.5px\">{{ modalItemCode }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:10.5px;font-weight:700;color:#A0A6B6;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px\">แผนก/ฝ่าย<\u002Fdiv><div style=\"font-size:13.5px\">{{ modalDept }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:10.5px;font-weight:700;color:#A0A6B6;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px\">ผู้ประสงค์ใช้<\u002Fdiv><div style=\"font-size:13.5px\">{{ modalRequester }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#F8F9FD;border-radius:14px;padding:18px 20px;margin-top:20px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px\">\n            <div><div style=\"font-size:10.5px;font-weight:700;color:#A0A6B6;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px\">จำนวน<\u002Fdiv><div style=\"font-family:'DM Mono',monospace;font-size:14px;font-weight:500\">{{ modalQty }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:10.5px;font-weight:700;color:#A0A6B6;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px\">ราคา/หน่วย<\u002Fdiv><div style=\"font-family:'DM Mono',monospace;font-size:14px;font-weight:500\">{{ modalUnitPrice }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:10.5px;font-weight:700;color:#A0A6B6;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px\">มูลค่า PO<\u002Fdiv><div style=\"font-family:'Sora',sans-serif;font-size:18px;font-weight:700;color:{{ accent }};letter-spacing:-.5px\">{{ modalAmount }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:10.5px;font-weight:700;color:#A0A6B6;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px\">ค้างรับ<\u002Fdiv><div style=\"font-family:'DM Mono',monospace;font-size:14px;font-weight:500\">{{ modalPending }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px\">\n            <div style=\"border:1px solid #ECEDF4;border-radius:14px;padding:16px 18px\">\n              <div style=\"font-size:12px;font-weight:700;color:#3A4055;margin-bottom:13px;display:flex;align-items:center;gap:7px\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ modalBDot }}\"><\u002Fspan>กำหนดส่ง<\u002Fdiv>\n              <div style=\"font-family:'Sora',sans-serif;font-size:20px;font-weight:700;letter-spacing:-.5px\">{{ modalDue }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:{{ modalBColor }};font-weight:600;margin-top:4px\">{{ modalDayDesc }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border:1px solid #ECEDF4;border-radius:14px;padding:16px 18px\">\n              <div style=\"font-size:12px;font-weight:700;color:#3A4055;margin-bottom:13px\">การรับของ (GRPO)<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px 14px\">\n                <div><div style=\"font-size:10px;color:#A0A6B6\">สถานะ<\u002Fdiv><div style=\"font-size:12.5px;font-weight:600\">{{ modalGrpoStatus }}<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:10px;color:#A0A6B6\">วันที่รับ<\u002Fdiv><div style=\"font-family:'DM Mono',monospace;font-size:12.5px\">{{ modalRecvDate }}<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:10px;color:#A0A6B6\">เลขที่ GRPO<\u002Fdiv><div style=\"font-family:'DM Mono',monospace;font-size:12.5px\">{{ modalGrpoNo }}<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:10px;color:#A0A6B6\">ปริมาณรับ<\u002Fdiv><div style=\"font-family:'DM Mono',monospace;font-size:12.5px\">{{ modalRecvQty }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:11px;color:#A0A6B6;margin-top:16px;text-align:right\">ผู้สร้าง PO: {{ modalCreatedBy }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#5B5BF5&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;compactRows&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showReceived&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { d:null, screen:'dashboard', search:'', status:'all', dept:'', from:'', to:'', sortKey:'dueDate', sortDir:1, page:1, modal:null, supplier:null, toast:'' };\n\n  componentDidMount(){\n    const t=(n)=>{ if(window.KST_DATA) this.setState({d:window.KST_DATA}); else if(n<80) setTimeout(()=>t(n+1),40); };\n    t(0);\n  }\n\n  SM = {\n    ov:{label:'เกินกำหนด', color:'#E5364B', bg:'#FFF0F2', dot:'#F43F5E'},\n    du:{label:'ถึงกำหนด', color:'#DA6B16', bg:'#FFF3E6', dot:'#FB923C'},\n    ne:{label:'ใกล้กำหนด', color:'#B5860B', bg:'#FBF4DE', dot:'#EAB308'},\n    ok:{label:'ยังมีเวลา', color:'#0E9E6E', bg:'#E7F9F1', dot:'#10B981'},\n    dn:{label:'รับแล้ว', color:'#3A6FF0', bg:'#EBF1FE', dot:'#3B82F6'},\n    ca:{label:'ยกเลิก', color:'#7E8497', bg:'#F1F2F6', dot:'#A0A6B6'}\n  };\n  meta(s){ return this.SM[s] || this.SM.ca; }\n  hexA(h,a){ h=(h||'#5B5BF5').replace('#',''); if(h.length===3)h=h.split('').map(x=>x+x).join(''); const n=parseInt(h,16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }\n  money(n){ return Number(n||0).toLocaleString('en-US',{maximumFractionDigits:0}); }\n  compact(n){ n=Number(n||0); const a=Math.abs(n); if(a>=1e6) return (n/1e6).toLocaleString('en-US',{maximumFractionDigits:2})+' ล้าน'; if(a>=1e3) return Math.round(n/1e3).toLocaleString('en-US')+'K'; return n.toLocaleString('en-US'); }\n  fdate(s){ if(!s) return '—'; const d=new Date(s); if(isNaN(d)) return String(s); return d.toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'2-digit'}); }\n  vshort(v){ if(!v) return ''; return v.replace(/^(บริษัท|ห้างหุ้นส่วนจำกัด|บมจ\\.|หจก\\.)\\s*/,'').replace(/\\s*จำกัด.*$/,'').trim() || v; }\n  dayTxt(r){ if(r.status==='dn'||r.status==='ca'||r.days===null||r.days===undefined) return '—'; return (r.days<0?'':'+')+r.days; }\n  badgeLabel(r){ const d=r.days; if(r.status==='ov') return 'เกิน '+Math.abs(d)+' วัน'; if(r.status==='du') return d===0?'วันนี้':'อีก '+d+' วัน'; if((r.status==='ne'||r.status==='ok')&&d!=null) return 'อีก '+d+' วัน'; return this.meta(r.status).label; }\n\n  row(r){\n    const M=this.meta(r.status);\n    return Object.assign({}, r, {\n      onClick:()=>this.setState({modal:r}),\n      dueFmt:this.fdate(r.dueDate), recvFmt:this.fdate(r.receiveDate),\n      amountFmt:this.money(r.amount), qtyText:(r.qty||0)+' '+(r.unit||''),\n      vshort:this.vshort(r.vendorName), dayTxt:this.dayTxt(r), dayColor:M.color,\n      badge:this.badgeLabel(r), bColor:M.color, bBg:M.bg, bDot:M.dot,\n      received:(r.status==='dn'), notReceived:(r.status!=='dn'),\n      department:r.department||'—'\n    });\n  }\n\n  go(s){ this.setState({screen:s, supplier:null}); }\n  srt(k){ this.setState(st=>({sortKey:k, sortDir: st.sortKey===k? -st.sortDir : 1})); }\n  showToast(m){ this.setState({toast:m}); clearTimeout(this._tt); this._tt=setTimeout(()=>this.setState({toast:''}),3200); }\n\n  renderVals(){\n    const d=this.state.d;\n    const accent=this.props.accentColor ?? '#5B5BF5';\n    const accentSoft=this.hexA(accent,0.10);\n    const accentGlow=this.hexA(accent,0.32);\n    const dense=this.props.compactRows ?? false;\n    const showRecv=this.props.showReceived ?? true;\n    const screen=this.state.screen;\n    const kc=(d&&d.kpi)||{all:0,ov:0,du:0,ne:0,ok:0,dn:0,ca:0};\n\n    const navFg=(k)=> screen===k? accent : '#6B7186';\n    const navBg=(k)=> screen===k? accentSoft : 'transparent';\n\n    const td=new Date((d&&d.today)||'2026-06-24');\n    const todayFmt=td.toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'});\n\n    // ── KPI cards ──\n    const openCount=(kc.ov||0)+(kc.du||0)+(kc.ne||0)+(kc.ok||0);\n    const kdef=[\n      {key:'all', label:'PO ทั้งหมด', value:(kc.all||0).toLocaleString(), color:'#171A2B', dot:accent, bg:'#FFFFFF', bd:'#ECEDF4', sub:((d&&d.totalSuppliers)||0)+' suppliers · ค้างส่ง '+this.compact(openCount)+' รายการ'},\n      {key:'ov', label:'เกินกำหนด', value:(kc.ov||0).toLocaleString(), color:'#E5364B', dot:'#F43F5E', bg:'#FFF4F5', bd:'#FBDEE2', sub:'มูลค่า '+this.compact((d&&d.overdueVal)||0)+' ฿'},\n      {key:'du', label:'ถึงกำหนด', value:(kc.du||0).toLocaleString(), color:'#DA6B16', dot:'#FB923C', bg:'#FFF7EF', bd:'#FBE6CF', sub:'ภายใน 0–3 วัน'},\n      {key:'ne', label:'ใกล้กำหนด', value:(kc.ne||0).toLocaleString(), color:'#B5860B', dot:'#EAB308', bg:'#FCF8E8', bd:'#F1E6BC', sub:'อีก 4–7 วัน'},\n      {key:'ok', label:'ยังมีเวลา', value:(kc.ok||0).toLocaleString(), color:'#0E9E6E', dot:'#10B981', bg:'#EDFAF3', bd:'#CCEFDD', sub:'มากกว่า 7 วัน'},\n      {key:'dn', label:'รับแล้ว / ปิด', value:(kc.dn||0).toLocaleString(), color:'#3A6FF0', dot:'#3B82F6', bg:'#EFF3FE', bd:'#D6E1FB', sub:'รับของครบ / ปิด PO'}\n    ];\n    const kpis=kdef.map(k=>Object.assign(k,{onClick:()=>this.setState({screen:'pos', status:k.key, page:1, supplier:null})}));\n\n    // ── donut (open statuses) ──\n    const segDefs=['ov','du','ne','ok'];\n    const openTotal=segDefs.reduce((a,s)=>a+(kc[s]||0),0);\n    const ot=openTotal||1;\n    let accP=0; const donutSegs=segDefs.map(s=>{ const v=kc[s]||0; const pct=v/ot*100; const seg={key:s,label:this.meta(s).label,count:v,pctTxt:Math.round(pct)+'%',color:this.meta(s).dot,start:accP,end:accP+pct}; accP+=pct; return seg; });\n    const donutGrad='conic-gradient('+donutSegs.map(s=>`${s.color} ${s.start}% ${s.end}%`).join(',')+')';\n\n    // ── monthly bars ──\n    const months=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];\n    const tmo=((d&&d.today)||'2026-06').slice(0,7);\n    const mrows=((d&&d.monthly)||[]).filter(x=>x.mo>=tmo).slice(0,7);\n    const maxC=Math.max(1,...mrows.map(x=>x.count));\n    const bars=mrows.map((x,i)=>{ const mi=parseInt(x.mo.slice(5,7),10)-1; return {label:months[mi], yr:x.mo.slice(2,4), count:x.count, amount:this.compact(x.amount), hPct:Math.max(5,Math.round(x.count/maxC*100))+'%', fill: i===0? accent : this.hexA(accent,0.42)}; });\n\n    // ── top suppliers (open value) ──\n    const tsAll=((d&&d.suppliers)||[]).filter(s=>s.open>0).sort((a,b)=>b.amount-a.amount).slice(0,6);\n    const maxA=Math.max(1,...tsAll.map(s=>s.amount));\n    const topSup=tsAll.map(s=>({name:this.vshort(s.name), open:s.open, ov:s.ov, amount:this.compact(s.amount), w:Math.max(5,Math.round(s.amount/maxA*100))+'%', fill: s.ov>0? '#F43F5E' : accent}));\n\n    // ── overdue list (dashboard) ──\n    const overdueList=((d&&d.pos)||[]).filter(r=>r.status==='ov').sort((a,b)=>a.days-b.days).slice(0,6).map(r=>this.row(r));\n\n    // ── PO list filtering ──\n    let rows=((d&&d.pos)||[]).slice();\n    if(!showRecv) rows=rows.filter(r=>r.status!=='dn');\n    if(this.state.status!=='all') rows=rows.filter(r=>r.status===this.state.status);\n    if(this.state.dept) rows=rows.filter(r=>r.department===this.state.dept);\n    if(this.state.from) rows=rows.filter(r=>r.dueDate&&r.dueDate>=this.state.from);\n    if(this.state.to) rows=rows.filter(r=>r.dueDate&&r.dueDate<=this.state.to);\n    const q=this.state.search.trim().toLowerCase();\n    if(q) rows=rows.filter(r=>((r.vendorName||'')+(r.poNo||'')+(r.itemName||'')+(r.itemCode||'')+(r.prNo||'')).toLowerCase().includes(q));\n    const sk=this.state.sortKey, sd=this.state.sortDir;\n    rows.sort((a,b)=>{ let va=a[sk], vb=b[sk]; if(va==null) return 1; if(vb==null) return -1; if(typeof va==='string') return va.localeCompare(vb,'th')*sd; return (va-vb)*sd; });\n    const total=rows.length, PP=40;\n    const pages=Math.max(1,Math.ceil(total/PP));\n    const page=Math.min(this.state.page,pages);\n    const start=(page-1)*PP;\n    const pageRows=rows.slice(start,start+PP).map(r=>this.row(r));\n    const countText= total? ('แสดง '+(start+1)+'–'+Math.min(start+PP,total)+' จาก '+total.toLocaleString()+' รายการ') : 'ไม่พบรายการตามตัวกรอง';\n    const pageInfo='หน้า '+page+'/'+pages;\n\n    // pagination items\n    let toks=[];\n    if(pages<=7){ for(let i=1;i<=pages;i++) toks.push(i); }\n    else { toks=[1]; if(page>3) toks.push('…'); for(let i=Math.max(2,page-1);i<=Math.min(pages-1,page+1);i++) toks.push(i); if(page<pages-2) toks.push('…'); toks.push(pages); }\n    const pagItems=toks.map(t=> t==='…'\n      ? {label:'…', bg:'transparent', fg:'#A0A6B6', bd:'transparent', onClick:()=>{}}\n      : {label:''+t, bg:(t===page?accent:'#fff'), fg:(t===page?'#fff':'#5A6175'), bd:(t===page?accent:'#E2E4EF'), onClick:()=>this.setState({page:t})});\n\n    // status chips — counts from the sample so they match what the table shows\n    const allPos=(d&&d.pos)||[];\n    const scnt={all:allPos.length,ov:0,du:0,ne:0,ok:0,dn:0,ca:0};\n    allPos.forEach(r=>{ if(scnt[r.status]!==undefined) scnt[r.status]++; });\n    const chipDefs=[['all','ทั้งหมด'],['ov','เกินกำหนด'],['du','ถึงกำหนด'],['ne','ใกล้กำหนด'],['ok','ยังมีเวลา'],['dn','รับแล้ว']];\n    const chips=chipDefs.map(([key,label])=>{ const active=this.state.status===key; const M= key==='all'? {color:accent,bg:accentSoft,dot:accent} : this.meta(key); const cnt= scnt[key]||0; return {key,label,count:cnt.toLocaleString(), dot:M.dot, fg: active?'#fff':M.color, bg: active? M.color : M.bg, bd: active? M.color : 'transparent', onClick:()=>this.setState({status:key,page:1})}; });\n\n    // dept options\n    const deptOpts=((d&&d.depts)||[]).map(x=>({value:x.dept,label:x.dept}));\n\n    // ── suppliers ──\n    const supplierRows=((d&&d.suppliers)||[]).slice(0,50).map(s=>({\n      name:this.vshort(s.name), full:s.name, code:s.code, lines:s.lines, amount:this.money(s.amount),\n      open:s.open, ov:s.ov, onTime:s.onTime, onTimeW:s.onTime+'%',\n      onTimeFill: s.onTime>=85? '#10B981' : s.onTime>=60? '#EAB308' : '#F43F5E',\n      openColor: s.open>0? '#DA6B16' : '#A0A6B6', ovColor: s.ov>0? '#E5364B' : '#A0A6B6',\n      onClick:()=>this.setState({supplier:s.name})\n    }));\n\n    // supplier detail\n    const selName=this.state.supplier;\n    const selObj=selName? ((d&&d.suppliers)||[]).find(s=>s.name===selName) : null;\n    const supDetailPos= selName? ((d&&d.pos)||[]).filter(r=>r.vendorName===selName).sort((a,b)=>(a.days??9999)-(b.days??9999)).map(r=>this.row(r)) : [];\n\n    // modal\n    const mo=this.state.modal;\n    const mM= mo? this.meta(mo.status) : this.SM.ca;\n    const dayDesc= mo? (mo.days==null?'—': mo.days<0? ('เกินกำหนดมาแล้ว '+Math.abs(mo.days)+' วัน') : mo.days===0? 'วันนี้เป็นวันครบกำหนด' : 'เหลืออีก '+mo.days+' วัน') : '';\n\n    return {\n      accent, accentSoft, accentGlow,\n      rowPad: dense? '7px' : '11px',\n      isDashboard: screen==='dashboard', isPos: screen==='pos', isSuppliers: screen==='suppliers',\n      goDash:()=>this.go('dashboard'), goPos:()=>this.go('pos'), goSup:()=>this.go('suppliers'),\n      goOverdue:()=>this.setState({screen:'pos', status:'ov', page:1, supplier:null}),\n      dashFg:navFg('dashboard'), dashBg:navBg('dashboard'),\n      posFg:navFg('pos'), posBg:navBg('pos'),\n      supFg:navFg('suppliers'), supBg:navBg('suppliers'),\n      posCountBg: screen==='pos'? this.hexA(accent,0.18):'#F1F2F8', posCountFg: screen==='pos'? accent:'#8A90A2',\n      openCountTxt: openCount.toLocaleString(),\n      todayFmt,\n      importClick:()=>this.showToast('การนำเข้า Excel จะทำงานเต็มรูปแบบในเวอร์ชันโปรดักชัน (Next.js + ฐานข้อมูล)'),\n      exportClick:()=>this.showToast('กำลังเตรียมไฟล์รายงานตามตัวกรองปัจจุบัน…'),\n      // dashboard\n      hasOverdue: (kc.ov||0)>0, ovCount:(kc.ov||0).toLocaleString(), ovValue:this.compact((d&&d.overdueVal)||0),\n      kpis,\n      donutGrad, donutSegs, openTotalTxt: openTotal.toLocaleString(),\n      bars, topSup, overdueList,\n      // po list\n      search:this.state.search, dept:this.state.dept, from:this.state.from, to:this.state.to,\n      onSearch:(e)=>this.setState({search:e.target.value,page:1}),\n      onDept:(e)=>this.setState({dept:e.target.value,page:1}),\n      onFrom:(e)=>this.setState({from:e.target.value,page:1}),\n      onTo:(e)=>this.setState({to:e.target.value,page:1}),\n      resetF:()=>this.setState({search:'',status:'all',dept:'',from:'',to:'',page:1}),\n      chips, deptOpts, pageRows, countText, pageInfo, pagItems,\n      prevClick:()=>this.setState(s=>({page:Math.max(1,s.page-1)})),\n      nextClick:()=>this.setState(s=>({page:Math.min(pages,s.page+1)})),\n      sortPo:()=>this.srt('poNo'), sortDue:()=>this.srt('dueDate'), sortDays:()=>this.srt('days'), sortSup:()=>this.srt('vendorName'), sortAmt:()=>this.srt('amount'),\n      // suppliers\n      supplierRows, supplierCountTxt:'ทั้งหมด '+(((d&&d.suppliers)||[]).length)+' ราย (แสดง 50 อันดับแรก)',\n      noSupplierSel: !selName, hasSupplierSel: !!selName, backToSup:()=>this.setState({supplier:null}),\n      supDetailName: selName||'', supInitial:(this.vshort(selName||'?')[0]||'?'),\n      supDetailCode: selObj? selObj.code : '', supDetailDepts: selObj? (selObj.depts||[]).slice(0,3).join(', ') : '',\n      supDetailAmount: selObj? this.compact(selObj.amount)+' ฿' : '—',\n      supDetailLines: selObj? selObj.lines : 0, supDetailOpen: selObj? selObj.open : 0,\n      supDetailOv: selObj? selObj.ov : 0, supDetailOnTime: selObj? selObj.onTime : 0,\n      supDetailPos,\n      // toast / modal\n      toastOn: !!this.state.toast, toastMsg:this.state.toast,\n      stop:(e)=>{ e.stopPropagation(); },\n      modalOpen: !!mo, closeModal:()=>this.setState({modal:null}),\n      modalPoNo: mo?mo.poNo:'', modalBadge: mo?this.badgeLabel(mo):'', modalBBg:mM.bg, modalBColor:mM.color, modalBDot:mM.dot,\n      modalItemName: mo?mo.itemName:'', modalVendor: mo?mo.vendorName:'',\n      modalLine: mo?(mo.lineItem||'—'):'', modalPoDate: mo?this.fdate(mo.poDate):'', modalPoStatus: mo?mo.poStatus:'',\n      modalVendorCode: mo?mo.vendorCode:'', modalItemCode: mo?mo.itemCode:'', modalDept: mo?(mo.department||'—'):'', modalRequester: mo?(mo.requester||'—'):'',\n      modalQty: mo?((mo.qty||0)+' '+(mo.unit||'')):'', modalUnitPrice: mo?this.money(mo.unitPrice):'', modalAmount: mo?(this.money(mo.amount)+' ฿'):'', modalPending: mo?((mo.pendingQty||0)+' '+(mo.unit||'')):'',\n      modalDue: mo?this.fdate(mo.dueDate):'', modalDayDesc:dayDesc,\n      modalGrpoStatus: mo?(mo.grpoStatus||'—'):'', modalRecvDate: mo?this.fdate(mo.receiveDate):'', modalGrpoNo: mo?(mo.grpoNo||'—'):'', modalRecvQty: mo?((mo.receiveQty||0)+' '+(mo.unit||'')):'',\n      modalCreatedBy: mo?(mo.createdBy||'—'):''\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
